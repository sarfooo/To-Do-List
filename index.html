<!DOCTYPE html>

<html lang="en-US">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <script type="module" src="./scripts/script.js"></script>
        <script type="module" src="./scripts/ToDoListManager.js"></script>
        <title>To-Do List!</title>
    </head>

    <body>
        <div class="App">
            <div class="header">
                <h1>To-Do List</h1>
                <form>
                    <input type="text" id="search" name="search">
                </form>
            </div>

            <div class="task-container">
                <form id="task-form">
                    <input type="text" minlength="3" required id="task" name="task">
                    <button>Add Task</button>
                </form>
                

                <ul id="task-list"></ul>
                
                <button id="clear-tasks">Clear Tasks</button>
            </div>
        </div>

    </body>


</html>
