<!DOCTYPE html>

<html lang="en-US">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <script src="./script.js"></script>
        <title>To-Do List!</title>
    </head>

    <body>
        <div class="App">
            <div class="header">
                <h1>To-Do List</h1>
                <form>
                    <input type="text" minlength="3" id="search" name="search">
                    <button>Search for task</button>
                </form>
            </div>

            <div class="task-container">
                <form>
                    <input type="text" minlength="3" required id="text" name="text">
                    <button>Add Task</button>
                </form>
                <div class="list-grid"></div>
            </div>
        </div>

    </body>


</html>
